name: Deploy to EC2

on:
  push:
    branches:
      - main  # הפריסה תתבצע בכל push לענף main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Angular
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ניקוי תיקיית היעד והעתקת הקבצים החדשים
            sudo rm -rf /var/www/html/*
            sudo cp -r ~/my-angular-app/frontend/dist/frontend/browser/* /var/www/html/
            
            # עדכון ה-Backend (בהנחה שגם הוא בגיט)
            cd ~/my-angular-app/
            git pull origin main
            npm install --prefix server
            
            # הפעלה מחדש של השרת
            sudo systemctl restart my-node-app
