<div class="form-container">
  <div class="form-card">✅
    <h2 class="form-title">הוספת טיפול חדש</h2>
    
    <div class="input-group">
      <label>שם הטיפול</label>
      <input [(ngModel)]="newTreatment.name" placeholder="למשל: טיפול פנים קלאסי">
    </div>

    <div class="input-group">
      <label>תיאור הטיפול</label>
      <textarea [(ngModel)]="newTreatment.description" placeholder="ספרי בקצרה על הטיפול..." rows="3"></textarea>
    </div>

    <div class="form-row">
      <div class="input-group">
        <label>משך זמן</label>
        <input [(ngModel)]="newTreatment.duration" placeholder="למשל: 60 דקות">
      </div>
      <div class="input-group">
        <label>מחיר (₪)</label>
        <input type="number" [(ngModel)]="newTreatment.price" placeholder="0">
      </div>
    </div>

    <button (click)="addTreatment()" class="btn-submit">אישור והוספה</button>
  </div>
</div>

@if (showSuccessToast) {
  <div class="success-toast">
    <div class="toast-content">
      <div class="icon-check">✓</div>
      <div class="text-content">
        <p class="main-msg">✅ הטיפול נוסף בהצלחה!</p>
        <p class="sub-msg">הוא כבר מופיע ברשימת הטיפולים</p>
      </div>
      <button (click)="showSuccessToast = false" class="close-btn">×</button>
    </div>
  </div>
}
